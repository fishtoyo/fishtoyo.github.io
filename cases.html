<!--[if lt IE 9]>

<script src="assets/js/plugins/jQuery/jquery.mobile-1.4.5.custom.min.js"></script>
<script src="assets/js/plugins/Bootstrap/bootstrap-3.3.2.min.js"></script>
<script>
$(document).ready(function(e) {
  // 讀取 JSON 並自動產生列表，渲染至 .slider-list 區塊
  $.getJSON('cases.json', function(data) {
    var $sliderList = $('.slider-list');
    
    // 自動清空寫死的 HTML (建議之後也可手動將 HTML 檔案中那些 .box 刪除，讓檔案乾淨)
    $sliderList.empty();
    
    var htmlContent = data.map(function(item) {
      var className = item.cls ? ' class="' + item.cls + '"' : '';
      var target = (item.url && item.url !== '#') ? ' target="_blank"' : '';
      
      return '<div class="box">' +
              '<a href="' + item.url + '" title="' + item.title + '"' + target + className + '>' +
                '<span class="img"><img src="assets/images/cases/' + item.id + '.png" alt="' + item.title + '"></span>' +
                '<span class="main">' +
                  '<span class="num">' + item.id + '</span>' +
                  '<span class="title">' + item.title + '</span>' +
                '</span>' +
              '</a>' +
            '</div>';
    }).join('');
    
    // 套用回版面上
    $sliderList.html(htmlContent);
  });
});
</script>
