<!DOCTYPE html>

<head>

<meta name="format-detection" content="telephone=no,address=no,email=no">

<!-- Favicon -->
<link href="favicon.ico" rel="icon">

<!-- Web Fonts -->
<link href="assets/css/font-awesome.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<!-- CSS Customization -->
<link href="assets/css/common.css" rel="stylesheet">
</head>
<body class="color-5">

<header id="header">
  <div class="max-wrap clearfix">
    <div class="home"><a href="/" title="FishToYo"><i class="material-icons">home</i><strong data-i18n="menu_home">首頁</strong></a></div>
    <nav id="nav" class="clearfix">
      <div class="hidden-element" data-i18n="nav_main_menu">主選單</div>
      <ul class="reset menu">
        <li>
          <a href="about.html" title="關於我">
            <i class="material-icons">face</i>
            <strong data-i18n="menu_about">關於我</strong>
          </a>
        </li>
        <li class="current">
          <a href="cases.html" title="作品集">
            <i class="material-icons">important_devices</i>
            <strong data-i18n="menu_cases">作品集</strong>
          </a>
        </li>
				<li>
					<a href="javascript:void(0);" id="lang-btn" title="Language">
						<i class="material-icons">language</i>
						<strong data-i18n="menu_lang">ENGLISH</strong>
					</a>
				</li>
      </ul>
    </nav>
  </div>
</header>

<div id="cases" class="page-wrap">
  <section>
    <header class="page-title">Cases<h1 data-i18n="cases_title_h1">作品集</h1></header>
    <div class="main-description">
      <div class="main-wrap">
        <div class="title" data-i18n="cases_page_title">集合 <strong>300+</strong> 專案</div>
      </div>
    </div>
    <div class="slider-list"></div>
  </section>
  <footer id="footer" data-i18n="footer_copy">
    Copyright &copy; 2026 Fishtoyo
  </footer>
</div>

<!--[if lt IE 9]>
<script src="assets/js/plugins/jQuery/jquery-1.11.2.min.js"></script>
<![endif]-->
<!--[if gte IE 9]><!-->
<script src="assets/js/plugins/jQuery/jquery-2.1.3.min.js"></script>
<!--<![endif]-->
<script src="assets/js/plugins/jQuery/jquery.mobile-1.4.5.custom.min.js"></script>
<script src="assets/js/plugins/Bootstrap/bootstrap-3.3.2.min.js"></script>
<script>
$(document).ready(function(e) {
  // 讀取 JSON 並自動產生列表，渲染至 .slider-list 區塊
  $.getJSON('cases.json', function(data) {
    var $sliderList = $('.slider-list');
    
    // 自動清空寫死的 HTML (建議之後也可手動將 HTML 檔案中那些 .box 刪除，讓檔案乾淨)
    $sliderList.empty();
    
    var htmlContent = data.map(function(item) {
      var className = item.cls ? ' class="' + item.cls + '"' : '';
      var target = (item.url && item.url !== '#') ? ' target="_blank"' : '';
      
      return '<div class="box">' +
              '<a href="' + item.url + '" title="' + item.title + '"' + target + className + '>' +
                '<span class="img"><img src="assets/images/cases/' + item.id + '.png" alt="' + item.title + '"></span>' +
                '<span class="main">' +
                  '<span class="num">' + item.id + '</span>' +
                  '<span class="title">' + item.title + '</span>' +
                '</span>' +
              '</a>' +
            '</div>';
    }).join('');
    
    // 套用回版面上
    $sliderList.html(htmlContent);
  });

  // --- 語系切換邏輯 ---
  var currentLang = localStorage.getItem('site_lang') || 'zh'; // 預設語系
  var i18nData = {};

  // 1. 取得 JSON 語系檔
  $.getJSON('lang.json', function(data) {
    i18nData = data;
    setLanguage(currentLang); // 載入完成後初始化文字
  });

  // 2. 監聽語系切換按鈕
  $('#lang-btn').on('click', function(e) {
    e.preventDefault();
    currentLang = currentLang === 'zh' ? 'en' : 'zh';
    localStorage.setItem('site_lang', currentLang); // 記住使用者選擇的語系
    setLanguage(currentLang);
  });

  // 3. 執行畫面文字替換
  function setLanguage(lang) {
    $('html').attr('lang', lang === 'zh' ? 'zh-Hant' : 'en'); // 更新 HTML 語系宣告
    $('[data-i18n]').each(function() {
      var key = $(this).attr('data-i18n');
      if (i18nData[lang] && i18nData[lang][key]) {
        $(this).html(i18nData[lang][key]);
      }
    });
  }
});
</script>
</body>
</html>
